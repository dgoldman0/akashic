# =========================================================
#  desk.toml — Desk configuration template
# =========================================================
#  Place this file alongside desk.f or point _DESK-CFG-A/L
#  at its contents before calling DESK-RUN.

# ---------------------------------------------------------
#  Theme colours
# ---------------------------------------------------------
#  Values: CSS named colours, "#RRGGBB", "#RGB", or a raw
#  xterm-256 palette index (0–255).

[desk.theme]
taskbar-fg   = "white"
taskbar-bg   = "#000057"       # dark blue
active-fg    = "black"
active-bg    = "#5fffac"       # bright blue
minimized-fg = "gray"
minimized-bg = "#000057"
pinned-fg    = "#808080"
pinned-bg    = "black"
divider-fg   = "#c0c0c0"
divider-bg   = "black"
clock-fg     = "cyan"
clock-bg     = "#000057"

# The hotbar is now the pinned projection of /app-catalog.bin.  Applet
# identity, installed-manifest paths, enabled/pinned/autostart/quarantine
# policy, and runtime status live in that durable catalog rather than this
# presentation config.  Alt+H opens the non-blocking catalog launcher.
#
# Older [[desk.hotbar]] tables are still parsed for source compatibility,
# but Desk never evaluates their file or descriptor strings and they do not
# override an active catalog.  Use Desk/Pad's Build & Install workflow and
# catalog flags for new entries.
